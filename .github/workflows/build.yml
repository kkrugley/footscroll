name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" -n 15)
          else
            LOG=$(git log --pretty=format:"- %s" ${LATEST_TAG}..HEAD)
          fi
          
          EOF=$(openssl rand -hex 12)
          echo "CHANGELOG<<$EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "FootScroll Build ${{ github.run_number }}"
          tag_name: "v0.0.${{ github.run_number }}"
          body: |
            ## Changelog
            
            ${{ steps.changelog.outputs.CHANGELOG }}
            
            ---
            - Commit: ${{ github.sha }}
            - Date: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          files: artifacts/**/*.uf2